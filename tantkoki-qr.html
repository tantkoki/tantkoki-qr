      --ry: 0deg;
      --shine-x: 50%;
      --shine-y: 18%;
      --card-x: 0px;
      --card-y: 0px;
      --logo-x: 0px;
      --logo-y: 0px;
      --slogan-x: 0px;
      --slogan-y: 0px;
      --actions-x: 0px;
      --actions-y: 0px;

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      background: var(--white);
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      font-family: "Cairo", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% -8%, rgba(207, 11, 22, .08), transparent 34%),
        var(--white);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -80px;
      z-index: 0;
      pointer-events: none;
      background-image: var(--pattern-red);
      background-size: 172px 425px;
      background-position: center top;
      opacity: .075;
      transform: rotate(-2deg) scale(1.06);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 8% 14%, rgba(207, 11, 22, .12) 0 5px, transparent 6px),
        radial-gradient(circle at 91% 28%, rgba(207, 11, 22, .09) 0 7px, transparent 8px),
        radial-gradient(circle at 14% 82%, rgba(207, 11, 22, .10) 0 4px, transparent 5px);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding:
        max(12px, env(safe-area-inset-top))
        11px
        max(18px, env(safe-area-inset-bottom));
    }

    .scene {
      width: min(100%, 400px);
      margin-inline: auto;
      perspective: 1100px;
      -webkit-perspective: 1100px;
      perspective-origin: 50% 42%;
      -webkit-perspective-origin: 50% 42%;
    }

    .motion-card {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform:
        translate3d(var(--card-x), var(--card-y), 0)
        rotateX(var(--rx))
        rotateY(var(--ry))
        scale3d(1.012, 1.012, 1.012);
      -webkit-transform:
        translate3d(var(--card-x), var(--card-y), 0)
        rotateX(var(--rx))
        rotateY(var(--ry))
        scale3d(1.012, 1.012, 1.012);
      transform-origin: 50% 48%;
      will-change: transform;
      touch-action: auto;
      transition: transform .15s ease-out;
      -webkit-transition: -webkit-transform .15s ease-out;
    }

    .motion-card::after {
      content: "";
      position: absolute;
      right: 12%;
      bottom: -17px;
      width: 76%;
      height: 30px;
      z-index: -1;
      border-radius: 50%;
      background: rgba(91, 4, 10, .18);
      filter: blur(17px);
      transform: translateZ(-55px);
    }

    .card {
      position: relative;
      z-index: 0;
      overflow: visible;
      padding: 10px 10px 12px;
      border: 1px solid rgba(207, 11, 22, .10);
      border-radius: 32px;
      background:
        linear-gradient(165deg, rgba(255,255,255,.99), rgba(255,247,243,.97));
      box-shadow:
        0 28px 70px rgba(119, 4, 12, .15),
        0 8px 22px rgba(119, 4, 12, .07),
        inset 0 1px 0 rgba(255,255,255,.95);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      animation: cardEnter .82s cubic-bezier(.16,.86,.26,1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(32px) scale(.965);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 13% 16%, rgba(207,11,22,.08) 0 42px, transparent 43px),
        radial-gradient(circle at 92% 42%, rgba(207,11,22,.055) 0 62px, transparent 63px);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      border-radius: inherit;
      background:
        radial-gradient(circle at var(--shine-x) var(--shine-y), rgba(255,255,255,.62), transparent 34%);
      mix-blend-mode: soft-light;
      transform: translateZ(90px);
    }

    .top-line {
      position: absolute;
      top: 0;
      right: 58px;
      left: 58px;
      height: 7px;
      z-index: 4;
      border-radius: 0 0 12px 12px;
      background: linear-gradient(90deg, var(--brand-dark), var(--brand-red-2), var(--brand-dark));
      box-shadow: 0 3px 12px rgba(207,11,22,.26);
      transform: translateZ(28px);
    }

    .logo-stage {
      position: relative;
      z-index: 3;
      display: grid;
      place-items: center;
      min-height: 224px;
      margin: -2px 0 -12px;
      transform: translate3d(var(--logo-x), var(--logo-y), 92px);
      -webkit-transform: translate3d(var(--logo-x), var(--logo-y), 92px);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
      animation: logoFloat 5.2s ease-in-out 1s infinite;
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translate3d(var(--logo-x), var(--logo-y), 92px) translateY(0);
        -webkit-transform: translate3d(var(--logo-x), var(--logo-y), 92px) translateY(0);
      }
      50% {
        transform: translate3d(var(--logo-x), var(--logo-y), 92px) translateY(-5px);
        -webkit-transform: translate3d(var(--logo-x), var(--logo-y), 92px) translateY(-5px);
      }
    }

    .logo-stage::before {
      content: "";
      position: absolute;
      width: 78%;
      aspect-ratio: 1;
      z-index: -2;
      border-radius: 43% 57% 52% 48% / 48% 42% 58% 52%;
      background:
        radial-gradient(circle at 35% 26%, rgba(255,255,255,.88), rgba(255,247,243,.22) 47%, transparent 68%);
      transform: rotate(7deg);
    }

    .logo-stage::after {
      content: "";
      position: absolute;
      bottom: 20px;
      width: 66%;
      height: 28px;
      z-index: -1;
      border-radius: 999px;
      background: rgba(101, 2, 8, .18);
      filter: blur(14px);
    }

    .logo {
      display: block;
      width: min(88%, 315px);
      max-height: 276px;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      filter:
        drop-shadow(0 17px 16px rgba(94, 3, 9, .17))
        drop-shadow(0 3px 1px rgba(255,255,255,.65));
    }

    .slogan-panel {
      position: relative;
      z-index: 2;
      overflow: hidden;
      margin: 0 3px 10px;
      padding: 14px 12px 15px;
      border: 1px solid rgba(119,2,10,.11);
      border-radius: 27px;
      color: var(--white);
      text-align: center;
      background: linear-gradient(155deg, #e4111d 0%, #cc0712 54%, #a7040c 100%);
      box-shadow:
        0 15px 28px rgba(130, 3, 12, .17),
        inset 0 1px 0 rgba(255,255,255,.23),
        inset 0 -1px 0 rgba(84,0,6,.18);
      transform: translate3d(var(--slogan-x), var(--slogan-y), 58px);
      -webkit-transform: translate3d(var(--slogan-x), var(--slogan-y), 58px);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
      animation: panelEnter .72s .16s cubic-bezier(.2,.8,.25,1) both;
    }

    @keyframes panelEnter {
      from {
        opacity: 0;
        transform: translate3d(var(--slogan-x), calc(var(--slogan-y) + 16px), 58px) scale(.985);
        -webkit-transform: translate3d(var(--slogan-x), calc(var(--slogan-y) + 16px), 58px) scale(.985);
      }
      to {
        opacity: 1;
        transform: translate3d(var(--slogan-x), var(--slogan-y), 58px) scale(1);
        -webkit-transform: translate3d(var(--slogan-x), var(--slogan-y), 58px) scale(1);
      }
    }

    .slogan-panel::before {
      content: "";
      position: absolute;
      inset: -12px;
      z-index: 0;
      pointer-events: none;
      background-image: var(--pattern-white);
      background-size: 150px 370px;
      background-position: center 8%;
      opacity: .22;
      transform: rotate(-1deg);
    }

    .slogan-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), transparent 34%),
        radial-gradient(circle at 16% 8%, rgba(255,255,255,.17), transparent 27%);
    }

    .slogan-copy {
      position: relative;
      z-index: 1;
      margin: 0;
    }

    .heavy {
      display: block;
      margin: 0;
      color: #fff;
      font-family: "Cairo", Tahoma, Arial, sans-serif;
      font-size: clamp(31px, 9.7vw, 45px);
      font-weight: 1000;
      line-height: .96;
      letter-spacing: -.04em;
      text-wrap: balance;
      text-shadow:
        0 2px 0 rgba(120, 0, 8, .42),
        0 7px 15px rgba(80, 0, 7, .22);
    }

    .heavy + .heavy {
      margin-top: 2px;
    }

    .hand {
      position: relative;
      display: inline-grid;
      margin-top: 8px;
      padding-inline: 7px;
      font-family: "Aref Ruqaa Ink", "Cairo", serif;
      font-size: clamp(33px, 10.1vw, 46px);
      font-weight: 700;
      line-height: .94;
      letter-spacing: -.025em;
      transform: rotate(-2deg) translateZ(22px);
      -webkit-transform: rotate(-2deg) translateZ(22px);
      isolation: isolate;
    }

    .hand-layer {
      grid-area: 1 / 1;
      display: block;
      white-space: nowrap;
    }

    .hand-under {
      display: none;
    }

    .hand-face {
      position: relative;
      z-index: 1;
      color: #ffffff !important;
      -webkit-text-fill-color: #ffffff !important;
      -webkit-text-stroke: .15px #ffffff;
      paint-order: stroke fill;
      text-shadow:
        0 3px 0 #e10c18,
        0 4px 0 rgba(120, 0, 8, .62),
        0 0 4px rgba(255,255,255,1),
        0 0 10px rgba(255,255,255,.82),
        0 0 18px rgba(255,255,255,.42);
      filter: drop-shadow(0 4px 5px rgba(83,0,6,.18));
    }

    .actions {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 2px 2px 0;
      transform: translate3d(var(--actions-x), var(--actions-y), 32px);
      -webkit-transform: translate3d(var(--actions-x), var(--actions-y), 32px);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
    }

    .action {
      position: relative;
      min-width: 0;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 9px;
      overflow: hidden;
      border: 1px solid rgba(207,11,22,.10);
      border-radius: 18px;
      color: var(--ink);
      text-decoration: none;
      background: linear-gradient(155deg, rgba(255,255,255,.99), rgba(255,247,243,.96));
      box-shadow:
        0 8px 16px rgba(107,4,10,.07),
        inset 0 1px 0 rgba(255,255,255,.96);
      transition:
        transform .2s cubic-bezier(.2,.8,.2,1),
        box-shadow .2s ease,
        border-color .2s ease;
      animation: actionEnter .6s cubic-bezier(.2,.8,.2,1) both;
    }

    .action:nth-child(1) { animation-delay: .25s; }
    .action:nth-child(2) { animation-delay: .31s; }
    .action:nth-child(3) { animation-delay: .37s; }
    .action:nth-child(4) { animation-delay: .43s; }
    .action:nth-child(5) { animation-delay: .49s; }
    .action:nth-child(6) { animation-delay: .55s; }

    @keyframes actionEnter {
      from { opacity: 0; transform: translateY(11px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .action::before {
      content: "";
      position: absolute;
      inset: auto -17px -29px auto;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(207,11,22,.05);
      transition: transform .25s ease;
    }

    .action:active {
      transform: translateY(2px) scale(.975);
      box-shadow:
        0 4px 9px rgba(107,4,10,.065),
        inset 0 1px 0 rgba(255,255,255,.95);
    }

    .action:active::before {
      transform: scale(1.35);
    }

    .action.primary {
      grid-column: 1 / -1;
      min-height: 64px;
      color: #fff;
      border-color: transparent;
      background: linear-gradient(145deg, var(--brand-red-2), var(--brand-dark));
      box-shadow:
        0 12px 22px rgba(155,3,13,.20),
        inset 0 1px 0 rgba(255,255,255,.22);
    }

    .action.primary::before {
      background: rgba(255,255,255,.11);
    }

    .action svg {
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
      width: 23px;
      height: 23px;
      overflow: visible;
      fill: none;
      stroke: var(--brand-red);
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action.primary svg {
      width: 25px;
      height: 25px;
      stroke: #fff;
    }

    .action .label {
      position: relative;
      z-index: 1;
      min-width: 0;
      overflow: hidden;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
      text-align: center;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .action.primary .label {
      font-size: 13px;
    }

    .action[hidden] {
      display: none !important;
    }

    .footer-note {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      margin: 13px 4px 2px;
      color: rgba(23,32,51,.68);
      font-size: 10.5px;
      font-weight: 800;
      transform: translateZ(15px);
    }

    .footer-note::before,
    .footer-note::after {
      content: "";
      width: 24px;
      height: 1px;
      background: rgba(207,11,22,.25);
    }

    .footer-note strong {
      color: var(--brand-red);
      font-weight: 1000;
    }

    @media (max-width: 350px) {
      .page {
        padding-inline: 9px;
      }

      .card {
        padding-inline: 9px;
        border-radius: 32px;
      }

      .logo-stage {
        min-height: 205px;
      }

      .logo {
        max-height: 252px;
      }

      .slogan-panel {
        padding: 13px 8px 14px;
      }

      .heavy {
        font-size: 29px;
      }

      .hand {
        font-size: 31px;
      }

      .actions {
        gap: 7px;
      }

      .action {
        min-height: 57px;
        border-radius: 17px;
      }

      .action .label {
        font-size: 11px;
      }
    }

    @media (min-width: 700px) {
      .page {
        padding-block: 30px;
      }
    }

    @media (hover: hover) and (pointer: fine) {
      .action:hover {
        transform: translateY(-3px);
        border-color: rgba(207,11,22,.22);
        box-shadow:
          0 14px 27px rgba(107,4,10,.11),
          inset 0 1px 0 rgba(255,255,255,.95);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }

    }
  </style>
</head>

  <script>
    /*
      عدّلي الروابط من هنا فقط.
      ضعي رابط جروب واتساب ورابط تطبيق فاست، وسيظهر الزر تلقائيًا.
      اتركي أي رابط فارغًا لإخفاء الزر.
    */
    const BRAND_LINKS = {
      whatsappNumber: "201060682224",
      whatsappGroup: "",
      facebook: "https://www.facebook.com/tant.koki/",
      website: "https://tantkoki.com/",
      fastApp: "",
      tiktok: ""
    };

    const cleanPhone = String(BRAND_LINKS.whatsappNumber || "").replace(/\D/g, "");

    const resolvedLinks = {
      website: BRAND_LINKS.website,
      facebook: BRAND_LINKS.facebook,
      whatsappGroup: BRAND_LINKS.whatsappGroup,
      fastApp: BRAND_LINKS.fastApp,
      tiktok: BRAND_LINKS.tiktok,
      whatsapp: cleanPhone ? `https://wa.me/${cleanPhone}` : "",
      phone: cleanPhone ? `tel:+${cleanPhone}` : ""
    };

    document.querySelectorAll("[data-link]").forEach((link) => {
      const key = link.dataset.link;
      const url = resolvedLinks[key];

      if (!url || url === "#") {
        link.hidden = true;
        return;
      }

      link.href = url;
    });

    const root = document.documentElement;
    const card = document.getElementById("motionCard");
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

    let sensorListenersAttached = false;
    let orientationReceived = false;
    let permissionRequestRunning = false;
    let lastOrientationTime = 0;

    function applyCardTilt(rotateX, rotateY) {
      const x = clamp(Number(rotateX) || 0, -25, 25);
      const y = clamp(Number(rotateY) || 0, -25, 25);
      const transform = `translate3d(0,0,0) rotateX(${x.toFixed(2)}deg) rotateY(${y.toFixed(2)}deg) scale3d(1.012,1.012,1.012)`;

      card.style.transform = transform;
      card.style.webkitTransform = transform;

      root.style.setProperty("--logo-x", `${(y * 1.18).toFixed(2)}px`);
      root.style.setProperty("--logo-y", `${(x * 0.94).toFixed(2)}px`);
      root.style.setProperty("--slogan-x", `${(y * 0.68).toFixed(2)}px`);
      root.style.setProperty("--slogan-y", `${(x * 0.52).toFixed(2)}px`);
      root.style.setProperty("--actions-x", `${(y * 0.32).toFixed(2)}px`);
      root.style.setProperty("--actions-y", `${(x * 0.25).toFixed(2)}px`);
      root.style.setProperty("--shine-x", `${clamp(50 + y * 1.9, 7, 93)}%`);
      root.style.setProperty("--shine-y", `${clamp(24 + x * 1.7, 7, 90)}%`);
    }

    // Direct mapping matching the reference implementation:
    // beta = front/back tilt, gamma = left/right tilt.
    function handleOrientation(event) {
      if (event.beta == null || event.gamma == null) return;

      let x = Number(event.beta);
      let y = Number(event.gamma);
      if (!Number.isFinite(x) || !Number.isFinite(y)) return;

      orientationReceived = true;
      lastOrientationTime = performance.now();

      x = clamp(x - 45, -25, 25);
      y = clamp(y, -25, 25);
      applyCardTilt(-x, y);
    }

    // Fallback for browsers that expose gravity data but no orientation event.
    function handleMotion(event) {
      if (orientationReceived && performance.now() - lastOrientationTime < 1200) return;

      const gravity = event.accelerationIncludingGravity;
      if (!gravity || gravity.x == null || gravity.y == null) return;

      const gx = Number(gravity.x);
      const gy = Number(gravity.y);
      if (!Number.isFinite(gx) || !Number.isFinite(gy)) return;

      applyCardTilt(
        clamp((gy + 6.9) * 3.2, -22, 22),
        clamp(-gx * 3.1, -22, 22)
      );
    }

    function attachSensorListeners() {
      if (sensorListenersAttached) return;
      sensorListenersAttached = true;

      window.addEventListener("deviceorientation", handleOrientation, true);
      window.addEventListener("deviceorientationabsolute", handleOrientation, true);
      window.addEventListener("devicemotion", handleMotion, true);
    }

    async function enableMotionSensors() {
      if (sensorListenersAttached || permissionRequestRunning) return;
      permissionRequestRunning = true;

      try {
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission === "granted") {
            attachSensorListeners();
          } else {
            permissionRequestRunning = false;
          }
        } else {
          attachSensorListeners();
        }
      } catch (_) {
        permissionRequestRunning = false;
      }
    }

    const needsGesturePermission =
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function";

    if (needsGesturePermission) {
      // iPhone/iPad require a real user gesture. Any normal first tap unlocks
      // the sensor; the card itself never follows the finger.
      document.addEventListener("touchend", enableMotionSensors, { capture: true, passive: true });
      document.addEventListener("click", enableMotionSensors, { capture: true, passive: true });
    } else {
      attachSensorListeners();
    }

    window.addEventListener("orientationchange", () => {
      applyCardTilt(0, 0);
    }, { passive: true });

    document.querySelectorAll(".action").forEach((action) => {
      action.addEventListener("click", () => {
        if ("vibrate" in navigator) navigator.vibrate(10);
      });
    });

    window.addEventListener("pagehide", () => {
      window.removeEventListener("deviceorientation", handleOrientation, true);
      window.removeEventListener("deviceorientationabsolute", handleOrientation, true);
      window.removeEventListener("devicemotion", handleMotion, true);
    });
  </script>
